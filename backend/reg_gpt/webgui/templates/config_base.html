{% extends "base.html" %}
{% block content %}
<section class="panel">
  <div class="subnav">
    {% for item in config_tabs %}
      <a class="subnav-link {% if request.endpoint == item.endpoint %}active{% endif %}" href="{{ url_for(item.endpoint) }}">{{ item.label }}</a>
    {% endfor %}
  </div>
</section>
{% block config_content %}{% endblock %}
{% endblock %}
